site_name: trnsci
site_description: Scientific computing suite for AWS Trainium via NKI
site_url: https://trnsci.github.io/trnsci/
repo_url: https://github.com/trnsci/trnsci
repo_name: trnsci/trnsci

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tabs

plugins:
  - search
  # The monorepo plugin lets sub-project docs live under each <pkg>/docs/
  # and be composed into this site at build time.
  - monorepo

nav:
  - Home: index.md
  - Installation: installation.md
  - Integration Example: integration.md
  - Sub-projects:
      - trnfft: '!include ./trnfft/mkdocs.yml'
      - trnblas: '!include ./trnblas/mkdocs.yml'
      - trnrand: '!include ./trnrand/mkdocs.yml'
      - trnsolver: '!include ./trnsolve/mkdocs.yml'
      - trnsparse: '!include ./trnsparse/mkdocs.yml'
      - trntensor: '!include ./trntensor/mkdocs.yml'

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

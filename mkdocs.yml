site_name: trnsci
site_description: Scientific computing libraries for AWS Trainium
site_url: https://trnsci.dev/
repo_url: https://github.com/trnsci/trnsci
repo_name: trnsci/trnsci

theme:
  name: material
  custom_dir: overrides
  font:
    text: Atkinson Hyperlegible
    code: Atkinson Hyperlegible Mono
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tabs
    - navigation.indexes

plugins:
  - search
  # monorepo composes each sub-project's mkdocs.yml into this site under its
  # own path (e.g. trnsci.dev/trnfft/). Sub-project repos are cloned into
  # sibling directories by the CI workflow before this plugin runs.
  - monorepo
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_date_format: yyyy/MM/dd
      archive: true
      categories: true
      pagination_per_page: 10

nav:
  - Home: index.md
  - Why trnsci: why.md
  - CUDA → trnsci: cuda_rosetta.md
  - Trainium positioning: trainium_positioning.md
  - Roadmap: roadmap.md
  - NKI validation status: nki_validation_status.md
  - Blog:
      - blog/index.md
  - Getting started:
      - Installation: installation.md
      - Deployment: deployment.md
  - Workflows:
      - Integration (DF-MP2): workflows/integration.md
      - Speech enhancement: workflows/speech_enhancement.md
      - Quantum chemistry: workflows/quantum_chemistry.md
  - Libraries:
      - trnfft: "!include ./trnfft/mkdocs.yml"
      - trnblas: "!include ./trnblas/mkdocs.yml"
      - trnrand: "!include ./trnrand/mkdocs.yml"
      - trnsolver: "!include ./trnsolve/mkdocs.yml"
      - trnsparse: "!include ./trnsparse/mkdocs.yml"
      - trntensor: "!include ./trntensor/mkdocs.yml"
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

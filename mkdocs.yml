site_name: trnsci
site_description: Scientific computing libraries for AWS Trainium
site_url: https://trnsci.dev/
repo_url: https://github.com/trnsci/trnsci
repo_name: trnsci/trnsci

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tabs
    - navigation.indexes

plugins:
  - search

# Each sub-project has its own mkdocs site under github.com/trnsci/<pkg>.
# The umbrella site links out to them in the libraries.md index rather than
# embedding them — keeps umbrella builds independent of sub-project layout.

nav:
  - Home: index.md
  - Why trnsci: why.md
  - CUDA → trnsci: cuda_rosetta.md
  - Trainium positioning: trainium_positioning.md
  - Getting started:
      - Installation: installation.md
      - Deployment: deployment.md
  - Workflows:
      - Integration (DF-MP2): workflows/integration.md
      - Speech enhancement: workflows/speech_enhancement.md
      - Quantum chemistry: workflows/quantum_chemistry.md
  - Libraries: libraries.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

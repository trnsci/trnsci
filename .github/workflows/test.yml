name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        subproject: [trnfft, trnblas, trnrand, trnsolve, trnsparse, trntensor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install sub-project
        run: pip install -e "./${{ matrix.subproject }}[dev]"
      - name: Test sub-project
        run: pytest ${{ matrix.subproject }}/tests/ -v -x --tb=short -m "not neuron"

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install all sub-projects + umbrella
        run: |
          for p in trnfft trnblas trnrand trnsolve trnsparse trntensor; do
            pip install -e "./$p[dev]"
          done
          pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/ -v -x --tb=short -m "not neuron"
      - name: Run DF-MP2 demo
        run: python examples/df_mp2_integrated.py --demo

name: CI

on:
  push:
    branches: [main]
  pull_request:

# The sub-project libraries each have their own CI. The umbrella repo's
# CI only verifies that the cross-library integration test works when
# all six libraries are installed from their current upstream locations.
#
# Sub-project repos currently live under scttfrdmn/. After transfer to
# the trnsci/ org, update the git URLs below.

env:
  SUBPROJECT_OWNER: scttfrdmn

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sub-projects from git
        run: |
          set -euo pipefail
          for pkg in trnfft trnblas trnrand trnsolver trnsparse trntensor; do
            echo "==> $pkg"
            if ! pip install "git+https://github.com/${SUBPROJECT_OWNER}/${pkg}.git#egg=${pkg}[dev]" ; then
              echo "    skipping $pkg — repo not found under ${SUBPROJECT_OWNER}/ yet"
            fi
          done

      - name: Install umbrella
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -x --tb=short -m "not neuron"

      - name: Run DF-MP2 demo
        run: python examples/quantum_chemistry/df_mp2_synthetic.py --demo
        continue-on-error: true

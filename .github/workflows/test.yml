name: CI

on:
  push:
    branches: [main]
  pull_request:

# The sub-project libraries each have their own CI and upload their own
# coverage to Codecov. The umbrella CI verifies the cross-library
# integration test + the runnable examples, and reports their coverage
# under the `trnsci/trnsci` project on Codecov.

env:
  SUBPROJECT_OWNER: trnsci

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sub-projects from git
        run: |
          set -euo pipefail
          for pkg in trnfft trnblas trnrand trnsolver trnsparse trntensor; do
            echo "==> $pkg"
            if ! pip install "git+https://github.com/${SUBPROJECT_OWNER}/${pkg}.git#egg=${pkg}[dev]" ; then
              echo "    skipping $pkg — repo not reachable under ${SUBPROJECT_OWNER}/ yet"
            fi
          done

      - name: Install umbrella
        run: pip install -e ".[dev]"

      - name: Run integration tests with coverage
        run: |
          pytest tests/ -v -x --tb=short -m "not neuron" \
            --cov=examples \
            --cov=tests \
            --cov-report=xml \
            --cov-report=term

      - name: Run DF-MP2 demo
        run: python examples/quantum_chemistry/df_mp2_synthetic.py --demo
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: integration
          fail_ci_if_error: false
